<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow | Modern FastAPI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      --card-bg: rgba(30, 41, 59, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(99, 102, 241, 0.4);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.35);
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.3);
      --danger: #f43f5e;
      --danger-hover: #e11d48;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --input-bg: rgba(15, 23, 42, 0.6);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-glow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    h1, h2, h3, .font-heading {
      font-family: 'Outfit', sans-serif;
    }

    .container {
      width: 100%;
      max-width: 920px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* Header */
    header {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      position: relative;
      overflow: hidden;
      flex-wrap: wrap;
      gap: 1rem;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      color: #fff;
      box-shadow: var(--shadow-glow);
    }

    .brand-text h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-text p {
      font-size: 0.825rem;
      color: var(--text-muted);
    }

    /* Header Dedicated Buttons */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn-dedicated-swagger {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: #ffffff;
      border: 1px solid rgba(16, 185, 129, 0.4);
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
      transition: all 0.2s ease;
    }

    .btn-dedicated-swagger:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45);
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
    }

    .btn-dedicated-inspector {
      background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
      color: #ffffff;
      border: 1px solid rgba(99, 102, 241, 0.4);
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      transition: all 0.2s ease;
    }

    .btn-dedicated-inspector:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
    }

    .btn-dedicated-reset {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border: 1px solid var(--card-border);
      padding: 0.6rem 0.95rem;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s ease;
    }

    .btn-dedicated-reset:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .log-badge-count {
      background: rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 0.75rem;
      padding: 0.1rem 0.45rem;
      border-radius: 9999px;
      font-weight: 700;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.25s ease;
    }

    .stat-card:hover {
      border-color: var(--card-hover-border);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .stat-icon.total { background: rgba(99, 102, 241, 0.15); color: var(--primary); }
    .stat-icon.open { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .stat-icon.done { background: rgba(16, 185, 129, 0.15); color: var(--accent); }

    .stat-info h4 {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-info .stat-value {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.2;
    }

    /* Action Form Card */
    .action-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .add-task-form {
      display: flex;
      gap: 0.75rem;
    }

    .input-field {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 0.75rem 1.25rem;
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .input-field::placeholder {
      color: var(--text-dim);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 25px -5px rgba(99, 102, 241, 0.5);
    }

    /* Filter & Search Bar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-group {
      display: flex;
      background: rgba(15, 23, 42, 0.5);
      padding: 4px;
      border-radius: var(--radius-md);
      border: 1px solid var(--card-border);
    }

    .filter-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.45rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
    }

    .search-box {
      position: relative;
      min-width: 240px;
    }

    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .search-box input {
      padding-left: 2.5rem;
      width: 100%;
    }

    /* Task List Container */
    .tasks-container {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 200px;
    }

    .task-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: all 0.25s ease;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-card:hover {
      border-color: var(--card-hover-border);
      transform: translateX(4px);
    }

    .task-card.done-card {
      opacity: 0.75;
      background: rgba(30, 41, 59, 0.4);
    }

    .task-left {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex: 1;
    }

    .custom-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: transparent;
      font-size: 0.75rem;
    }

    .task-card:hover .custom-checkbox {
      border-color: var(--primary);
    }

    .custom-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .task-title {
      font-size: 0.975rem;
      font-weight: 500;
      color: var(--text-main);
      word-break: break-word;
      transition: all 0.2s ease;
    }

    .done-card .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .btn-icon.delete:hover {
      background: rgba(244, 63, 94, 0.15);
      border-color: rgba(244, 63, 94, 0.4);
      color: var(--danger);
    }

    .empty-state {
      background: var(--card-bg);
      border: 1px dashed var(--card-border);
      border-radius: var(--radius-lg);
      padding: 3rem 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 2.5rem;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    /* Dedicated Realtime REST Inspector Modal / Card */
    .inspector-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: all 0.3s ease;
    }

    .inspector-card.highlight {
      border-color: var(--primary);
      box-shadow: 0 0 25px var(--primary-glow);
    }

    .inspector-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .inspector-header h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .log-box {
      background: #090d16;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      max-height: 180px;
      overflow-y: auto;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.825rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .log-entry {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      animation: fadeIn 0.2s ease;
    }

    .log-method {
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.725rem;
    }

    .log-method.GET { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .log-method.POST { background: rgba(16, 185, 129, 0.2); color: #34d399; }
    .log-method.PUT { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
    .log-method.DELETE { background: rgba(244, 63, 94, 0.2); color: #f87171; }

    .log-status { font-weight: 600; color: #a7f3d0; }
    .log-url { color: #cbd5e1; }
    .log-time { color: var(--text-dim); margin-left: auto; font-size: 0.75rem; }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      color: var(--text-dim);
      font-size: 0.825rem;
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
      .add-task-form {
        flex-direction: column;
      }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header>
      <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-list-check"></i></div>
        <div class="brand-text">
          <h1>TaskFlow API</h1>
          <p>FastAPI REST Engine & Interactive Control Dashboard</p>
        </div>
      </div>
      
      <!-- Dedicated Action Buttons -->
      <div class="header-actions">
        <a href="/docs" target="_blank" class="btn-dedicated-swagger" title="Open Interactive Swagger OpenAPI Documentation">
          <i class="fa-solid fa-book-bookmark"></i> Swagger UI
        </a>
        <button onclick="scrollToInspector()" class="btn-dedicated-inspector" title="View Realtime REST HTTP Activity Log">
          <i class="fa-solid fa-terminal"></i> Live REST Inspector <span class="log-badge-count" id="log-count">0</span>
        </button>
        <button onclick="resetData()" class="btn-dedicated-reset" title="Reset Demo Data">
          <i class="fa-solid fa-rotate-left"></i> Reset
        </button>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon total"><i class="fa-solid fa-bars-staggered"></i></div>
        <div class="stat-info">
          <h4>Total Tasks</h4>
          <div class="stat-value" id="stat-total">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon open"><i class="fa-regular fa-clock"></i></div>
        <div class="stat-info">
          <h4>Pending</h4>
          <div class="stat-value" id="stat-open">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon done"><i class="fa-solid fa-circle-check"></i></div>
        <div class="stat-info">
          <h4>Completed</h4>
          <div class="stat-value" id="stat-done">0</div>
        </div>
      </div>
    </div>

    <!-- Main Action Card -->
    <div class="action-card">
      <form class="add-task-form" id="add-form" onsubmit="handleAddTask(event)">
        <input type="text" id="task-input" class="input-field" placeholder="What needs to be done today?" required />
        <button type="submit" class="btn-primary">
          <i class="fa-solid fa-plus"></i> Add Task
        </button>
      </form>

      <div class="toolbar">
        <div class="filter-group">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('open', this)">Pending</button>
          <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
        </div>

        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" class="input-field" placeholder="Search tasks..." oninput="handleSearch()" />
        </div>
      </div>
    </div>

    <!-- Task List -->
    <div id="tasks-container" class="tasks-container">
      <!-- Dynamically injected tasks -->
    </div>

    <!-- Dedicated Live Realtime REST Activity Inspector Card -->
    <div class="inspector-card" id="inspector-section">
      <div class="inspector-header">
        <h3><i class="fa-solid fa-code"></i> Dedicated Real-Time REST Activity Inspector</h3>
        <span style="font-size: 0.75rem; color: var(--text-muted);"><i class="fa-solid fa-circle-dot" style="color: var(--accent);"></i> Live HTTP Stream</span>
      </div>
      <div class="log-box" id="log-box">
        <div class="log-entry">
          <span class="log-method GET">GET</span>
          <span class="log-url">/health</span>
          <span class="log-status">200 OK</span>
          <span class="log-time">System Ready</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <span>TaskFlow FastAPI Engine &bull; In-Memory REST Architecture</span>
      <span>Swagger Specs: <a href="/docs" target="_blank">/docs</a></span>
    </footer>
  </div>

  <script>
    let currentFilter = 'all';
    let searchQuery = '';
    let totalLogsCount = 1;

    // Fetch tasks & stats on load
    document.addEventListener('DOMContentLoaded', () => {
      fetchTasks();
      fetchStats();
    });

    function logApiCall(method, url, statusText) {
      const logBox = document.getElementById('log-box');
      const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-method ${method}">${method}</span>
        <span class="log-url">${url}</span>
        <span class="log-status">${statusText}</span>
        <span class="log-time">${time}</span>
      `;
      logBox.prepend(entry);
      totalLogsCount++;
      document.getElementById('log-count').textContent = totalLogsCount;
    }

    function scrollToInspector() {
      const card = document.getElementById('inspector-section');
      card.scrollIntoView({ behavior: 'smooth' });
      card.classList.add('highlight');
      setTimeout(() => card.classList.remove('highlight'), 1200);
    }

    async function fetchTasks() {
      let url = '/tasks?';
      if (currentFilter === 'done') url += 'done=true&';
      if (currentFilter === 'open') url += 'done=false&';
      if (searchQuery.trim()) url += `search=${encodeURIComponent(searchQuery.trim())}&`;

      try {
        const res = await fetch(url);
        logApiCall('GET', url, `${res.status} OK`);
        const tasks = await res.json();
        renderTasks(tasks);
      } catch (err) {
        console.error('Failed to fetch tasks:', err);
      }
    }

    async function fetchStats() {
      try {
        const res = await fetch('/stats');
        const stats = await res.json();
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-open').textContent = stats.open;
        document.getElementById('stat-done').textContent = stats.done;
      } catch (err) {
        console.error('Failed to fetch stats:', err);
      }
    }

    function renderTasks(tasks) {
      const container = document.getElementById('tasks-container');
      container.innerHTML = '';

      if (!tasks || tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fa-solid fa-clipboard-check"></i></div>
            <h3>No Tasks Found</h3>
            <p>Add a new task above or try clearing your filters.</p>
          </div>
        `;
        return;
      }

      tasks.forEach(task => {
        const card = document.createElement('div');
        card.className = `task-card ${task.done ? 'done-card' : ''}`;
        card.innerHTML = `
          <div class="task-left">
            <div class="custom-checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id}, ${!task.done})">
              <i class="fa-solid fa-check"></i>
            </div>
            <span class="task-title">${escapeHtml(task.title)}</span>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="editTaskTitle(${task.id}, '${escapeHtml(task.title).replace(/'/g, "\\'")}')" title="Edit Title">
              <i class="fa-solid fa-pen"></i>
            </button>
            <button class="btn-icon delete" onclick="deleteTask(${task.id})" title="Delete Task">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function handleAddTask(e) {
      e.preventDefault();
      const input = document.getElementById('task-input');
      const title = input.value.trim();
      if (!title) return;

      try {
        const res = await fetch('/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        logApiCall('POST', '/tasks', `${res.status} Created`);
        if (res.ok) {
          input.value = '';
          fetchTasks();
          fetchStats();
        }
      } catch (err) {
        console.error('Error adding task:', err);
      }
    }

    async function toggleTask(id, newStatus) {
      try {
        const res = await fetch(`/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: newStatus })
        });
        logApiCall('PUT', `/tasks/${id}`, `${res.status} OK`);
        fetchTasks();
        fetchStats();
      } catch (err) {
        console.error('Error toggling task:', err);
      }
    }

    async function editTaskTitle(id, oldTitle) {
      const newTitle = prompt('Edit Task Title:', oldTitle);
      if (newTitle === null || !newTitle.trim() || newTitle.trim() === oldTitle) return;

      try {
        const res = await fetch(`/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle.trim() })
        });
        logApiCall('PUT', `/tasks/${id}`, `${res.status} OK`);
        fetchTasks();
      } catch (err) {
        console.error('Error updating task title:', err);
      }
    }

    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) return;

      try {
        const res = await fetch(`/tasks/${id}`, { method: 'DELETE' });
        logApiCall('DELETE', `/tasks/${id}`, `${res.status} No Content`);
        fetchTasks();
        fetchStats();
      } catch (err) {
        console.error('Error deleting task:', err);
      }
    }

    async function resetData() {
      try {
        const res = await fetch('/reset', { method: 'POST' });
        logApiCall('POST', '/reset', `${res.status} OK`);
        fetchTasks();
        fetchStats();
      } catch (err) {
        console.error('Error resetting data:', err);
      }
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      fetchTasks();
    }

    let searchTimeout;
    function handleSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = document.getElementById('search-input').value;
        fetchTasks();
      }, 250);
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
